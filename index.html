            // ── Engine Sound (Physically-informed cylinder + waveguide synthesis) ─
            // Based on: cylinder pressure simulation + waveguide exhaust pipes
            // Reference: AngeTheGreat engine-sim, Antonio-R1 engine-sound-generator
            let audioCtx = null;
            let engineNodes = null;
            let aiEngineNodes = [];
            let noiseBuffer = null;

            const IDLE_RPM = 1200;
            const MAX_RPM = 3000;

            // ── Waveguide delay line ──
            // Models sound bouncing through a pipe (exhaust/intake)
            class Waveguide {
                constructor(lengthSamples, reflectionFactor, dampening) {
                    this.length = Math.max(2, Math.round(lengthSamples));
                    this.buffer = new Float32Array(this.length);
                    this.pos = 0;
                    this.reflection = reflectionFactor;
                    this.dampening = dampening;
                    this.lastOut = 0;
                }
                process(input) {
                    const delayed = this.buffer[this.pos];
                    const filtered =
                        delayed + this.dampening * (this.lastOut - delayed);
                    this.lastOut = filtered;
                    this.buffer[this.pos] = input + filtered * this.reflection;
                    this.pos = (this.pos + 1) % this.length;
                    return filtered;
                }
            }

            // ── Cylinder model ──
            // Simulates 4-stroke cycle pressure as audio signal
            class Cylinder {
                constructor(phaseOffset) {
                    this.phase = phaseOffset;
                    this.pressure = 0;
                    this.combustionHeat = 0;
                }
                update(crankPhaseIncrement, throttle) {
                    this.phase += crankPhaseIncrement;
                    if (this.phase >= 1) this.phase -= 1;
                    const p = this.phase;
                    let pressure = 0;
                    if (p < 0.25) {
                        pressure = -0.05 * Math.sin((p * Math.PI) / 0.25);
                    } else if (p < 0.5) {
                        const t = (p - 0.25) / 0.25;
                        pressure = 0.2 * t * t;
                    } else if (p < 0.55) {
                        const t = (p - 0.5) / 0.05;
                        const combustionForce = 0.4 + throttle * 0.6;
                        pressure =
                            combustionForce *
                            Math.exp(-t * 3) *
                            (1 + Math.random() * 0.3);
                        this.combustionHeat = combustionForce;
                    } else if (p < 0.75) {
                        const t = (p - 0.55) / 0.2;
                        pressure = this.combustionHeat * 0.3 * Math.exp(-t * 5);
                        pressure += Math.random() * 0.02 * this.combustionHeat;
                    } else {
                        const t = (p - 0.75) / 0.25;
                        if (t < 0.1) {
                            pressure =
                                this.combustionHeat * 0.15 * (1 - t / 0.1);
                            pressure += Math.random() * 0.05;
                        } else {
                            pressure = 0.01 * Math.random();
                        }
                    }
                    this.pressure = pressure;
                    return pressure;
                }
            }

            // ── Engine state factory ──
            // Creates a full engine with cylinders, waveguides, and its own throttle/volume
            function createEngineState(sampleRate, numCylinders) {
                const metersToSamples = (m) =>
                    Math.round((m * sampleRate) / 343);

                // Firing order offsets
                const firingOrders = {
                    2: [0, 1],
                    4: [0, 2, 1, 3],
                    6: [0, 4, 2, 5, 1, 3],
                    8: [0, 5, 3, 6, 2, 7, 1, 4],
                };
                const order = firingOrders[numCylinders] || firingOrders[8];
                const cylinders = [];
                for (let i = 0; i < numCylinders; i++) {
                    cylinders.push(new Cylinder(order[i] / numCylinders));
                }

                const halfCyl = Math.ceil(numCylinders / 2);

                return {
                    cylinders,
                    halfCyl,
                    throttle: 0,
                    targetThrottle: 0,
                    volume: 1.0,
                    // Exhaust waveguides
                    exhaustManifoldL: new Waveguide(
                        metersToSamples(0.6),
                        -0.2,
                        0.2,
                    ),
                    exhaustManifoldR: new Waveguide(
                        metersToSamples(0.55),
                        -0.2,
                        0.2,
                    ),
                    collector: new Waveguide(metersToSamples(0.3), -0.3, 0.15),
                    exhaustPipe: new Waveguide(
                        metersToSamples(1.5),
                        -0.35,
                        0.25,
                    ),
                    muffler1: new Waveguide(metersToSamples(0.4), -0.5, 0.4),
                    muffler2: new Waveguide(metersToSamples(0.25), -0.45, 0.35),
                    tailpipe: new Waveguide(metersToSamples(0.8), -0.6, 0.2),
                    // Intake waveguides
                    intakeManifold: new Waveguide(
                        metersToSamples(0.3),
                        -0.3,
                        0.1,
                    ),
                    airbox: new Waveguide(metersToSamples(0.5), -0.25, 0.15),
                };
            }

            // Process one sample for an engine state
            function processEngineSample(
                state,
                phaseInc,
                noiseTable,
                noiseIdx,
                cfg,
            ) {
                let leftBankPressure = 0;
                let rightBankPressure = 0;
                let intakePressure = 0;

                const numCyl = state.cylinders.length;
                for (let c = 0; c < numCyl; c++) {
                    const p = state.cylinders[c].update(
                        phaseInc,
                        state.throttle,
                    );
                    if (c < state.halfCyl) leftBankPressure += p;
                    else rightBankPressure += p;
                    if (state.cylinders[c].phase < 0.25) {
                        intakePressure += state.cylinders[c].pressure;
                    }
                }

                // Exhaust waveguide chain
                let exhaustL = state.exhaustManifoldL.process(
                    leftBankPressure * 0.5,
                );
                let exhaustR = state.exhaustManifoldR.process(
                    rightBankPressure * 0.5,
                );
                let merged = state.collector.process(
                    (exhaustL + exhaustR) * 0.5,
                );
                let pipeOut = state.exhaustPipe.process(merged);
                let muffled = state.muffler1.process(pipeOut);
                muffled = state.muffler2.process(muffled);
                let exhaustOut = state.tailpipe.process(muffled);

                // Intake waveguide
                let intakeOut = state.intakeManifold.process(
                    intakePressure * 0.3,
                );
                intakeOut = state.airbox.process(intakeOut);

                // Engine block vibrations
                let blockVibration =
                    (leftBankPressure + rightBankPressure) * 0.05;

                // Mechanical valve noise
                let mechanical = 0;
                for (let c = 0; c < numCyl; c++) {
                    const p = state.cylinders[c].phase;
                    if (
                        p < 0.003 ||
                        (p > 0.498 && p < 0.503) ||
                        (p > 0.748 && p < 0.753)
                    ) {
                        mechanical +=
                            noiseTable[(noiseIdx + c) % noiseTable.length] *
                            0.04;
                    }
                }

                // Mix
                let sample =
                    exhaustOut * cfg.exhaustMix +
                    intakeOut * (cfg.intakeMix + state.throttle * 0.15) +
                    blockVibration * cfg.blockMix +
                    mechanical * cfg.mechMix;

                // Soft clipping
                sample = Math.tanh(sample * cfg.saturation);

                return sample * state.volume;
            }

            function initAudio() {
                if (audioCtx) return;
                audioCtx = new (
                    window.AudioContext || window.webkitAudioContext
                )();
                const sampleRate = audioCtx.sampleRate;

                // Shared noise buffer
                const noiseSize = sampleRate;
                noiseBuffer = audioCtx.createBuffer(1, noiseSize, sampleRate);
                const noiseData = noiseBuffer.getChannelData(0);
                for (let i = 0; i < noiseSize; i++)
                    noiseData[i] = Math.random() * 2 - 1;

                // Noise table for mechanical sounds (used in ScriptProcessor)
                const noiseTable = new Float32Array(sampleRate);
                for (let i = 0; i < sampleRate; i++)
                    noiseTable[i] = Math.random() * 2 - 1;

                // Create engine states: player (8 cyl) + 3 AI (4 cyl each)
                const playerEngine = createEngineState(
                    sampleRate,
                    _tuneAudio.numCylinders,
                );
                const aiEngines = [];
                for (let i = 0; i < 3; i++) {
                    aiEngines.push(createEngineState(sampleRate, 4));
                }

                let noiseIdx = 0;
                const bufSize = 512;
                const engineProcessor = audioCtx.createScriptProcessor(
                    bufSize,
                    0,
                    1,
                );

                engineProcessor.onaudioprocess = function (e) {
                    const output = e.outputBuffer.getChannelData(0);
                    const cfg = _tuneAudio;

                    // Player RPM from throttle
                    const playerRpm =
                        IDLE_RPM + playerEngine.throttle * (MAX_RPM - IDLE_RPM);
                    const playerPhaseInc = playerRpm / 120 / sampleRate;

                    // Smooth throttle
                    playerEngine.throttle +=
                        (playerEngine.targetThrottle - playerEngine.throttle) *
                        0.08;

                    // AI throttle smoothing
                    for (let a = 0; a < aiEngines.length; a++) {
                        aiEngines[a].throttle +=
                            (aiEngines[a].targetThrottle -
                                aiEngines[a].throttle) *
                            0.08;
                    }

                    for (let i = 0; i < bufSize; i++) {
                        let sample = processEngineSample(
                            playerEngine,
                            playerPhaseInc,
                            noiseTable,
                            noiseIdx,
                            cfg,
                        );

                        // AI engines
                        for (let a = 0; a < aiEngines.length; a++) {
                            const aiRpm =
                                IDLE_RPM +
                                aiEngines[a].throttle * (MAX_RPM - IDLE_RPM);
                            const aiPhaseInc = aiRpm / 120 / sampleRate;
                            sample += processEngineSample(
                                aiEngines[a],
                                aiPhaseInc,
                                noiseTable,
                                noiseIdx,
                                cfg,
                            );
                        }

                        output[i] = sample;
                        noiseIdx++;
                    }
                };

                // EQ chain
                const highpass = audioCtx.createBiquadFilter();
                highpass.type = "highpass";
                highpass.frequency.value = 30;
                highpass.Q.value = 0.5;

                const presence = audioCtx.createBiquadFilter();
                presence.type = "peaking";
                presence.frequency.value = 200;
                presence.Q.value = 1.5;
                presence.gain.value = _tuneAudio.presenceGain;

                const warmth = audioCtx.createBiquadFilter();
                warmth.type = "peaking";
                warmth.frequency.value = 80;
                warmth.Q.value = 2;
                warmth.gain.value = _tuneAudio.warmthGain;

                const masterGain = audioCtx.createGain();
                masterGain.gain.value = _tuneAudio.masterVolume;

                engineProcessor.connect(highpass);
                highpass.connect(warmth);
                warmth.connect(presence);
                presence.connect(masterGain);
                masterGain.connect(audioCtx.destination);

                // Store references
                engineNodes = {
                    playerEngine,
                    aiEngines,
                    masterGain,
                    presence,
                    warmth,
                    engineProcessor,
                };
                aiEngineNodes = aiEngines;

                // Terrain noise channel (gravel/grass crunch)
                const terrainNoise = audioCtx.createBufferSource();
                terrainNoise.buffer = noiseBuffer;
                terrainNoise.loop = true;
                const terrainGain = audioCtx.createGain();
                terrainGain.gain.value = 0;
                const terrainFilter = audioCtx.createBiquadFilter();
                terrainFilter.type = "bandpass";
                terrainFilter.frequency.value = 800;
                terrainFilter.Q.value = 0.8;
                terrainNoise.connect(terrainFilter);
                terrainFilter.connect(terrainGain);
                terrainGain.connect(audioCtx.destination);
                terrainNoise.start();
                engineNodes.terrainGain = terrainGain;
                engineNodes.terrainFilter = terrainFilter;
            }

            function updateEngineSound(dt) {
                if (!engineNodes) return;
                const speed = Math.abs(car.speed);
                const cfg = _tuneAudio;

                // Update EQ from tuning panel
                engineNodes.masterGain.gain.value = cfg.masterVolume;
                engineNodes.presence.gain.value = cfg.presenceGain;
                engineNodes.warmth.gain.value = cfg.warmthGain;

                // When the player has finished (or race ended), force idle.
                // The frozen update branch doesn't tick jump physics, so stale
                // `airborne` flags would otherwise pin the engine at full rev.
                const playerDone = !!race.results.find(r => r.name === 'Player');
                if (race.finished || playerDone || isCountingDown()) {
                    engineNodes.playerEngine.targetThrottle = 0.05;
                    engineNodes.playerEngine.volume = 1.0;
                    for (let i = 0; i < aiCars.length && i < aiEngineNodes.length; i++) {
                        const ai = aiCars[i];
                        if (race.finished || isCountingDown()) {
                            aiEngineNodes[i].targetThrottle = 0.05;
                            aiEngineNodes[i].volume = 0;
                        } else {
                            // Grace window: AI still driving, keep their engines live
                            const dx = ai.col - car.col, dy = ai.row - car.row;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            const maxHearDist = 30;
                            if (dist < maxHearDist) {
                                const proximity = 1 - dist / maxHearDist;
                                aiEngineNodes[i].targetThrottle = Math.abs(ai.speed) / ai.maxSpeed;
                                aiEngineNodes[i].volume = proximity * proximity * 2.5;
                            } else {
                                aiEngineNodes[i].targetThrottle = 0;
                                aiEngineNodes[i].volume = 0;
                            }
                        }
                    }
                    return;
                }

                // Player throttle: normal driving tops out at 0.6, leaving headroom
                // for airborne rev spikes to be clearly audible
                let throttle = Math.max(0, Math.min(1, speed / car.maxSpeed));
                throttle = 0.05 + throttle * 0.55; // range: 0.05 (idle) to 0.6 (full speed)

                // Bump detection
                const hHere = getTerrainHeight(car.col, car.row);
                const hAhead = getTerrainHeight(
                    car.col + Math.cos(car.angle) * 0.3,
                    car.row + Math.sin(car.angle) * 0.3,
                );
                const bump = Math.abs(hAhead - hHere);
                const airborne = car.airHeight > 0;

                // Rough terrain: engine labors (throttle fluctuates with bumps)
                if (bump > 0.1 && speed > 1 && !airborne) {
                    const bumpIntensity = Math.min(1, bump);
                    throttle *= 1 + (Math.random() - 0.3) * bumpIntensity * 0.8;
                    throttle = Math.max(0.05, Math.min(0.7, throttle));
                }

                // Airborne: wheels spin freely = revs scream up
                if (airborne) {
                    const airFactor = Math.min(1, car.airHeight / 1.5);
                    throttle = Math.min(1, 0.7 + airFactor * 0.3);
                }

                engineNodes.playerEngine.targetThrottle = throttle;
                engineNodes.playerEngine.volume = 1.0;

                // Terrain sound response
                const tileCol = Math.round(car.col),
                    tileRow = Math.round(car.row);
                const onTrack =
                    tileCol >= 0 &&
                    tileCol < MAP_SIZE &&
                    tileRow >= 0 &&
                    tileRow < MAP_SIZE &&
                    trackMap[tileRow][tileCol] > 0;
                const onCurb =
                    tileCol >= 0 &&
                    tileCol < MAP_SIZE &&
                    tileRow >= 0 &&
                    tileRow < MAP_SIZE &&
                    trackMap[tileRow][tileCol] === 2;
                const t = audioCtx.currentTime;
                const speedFactor = speed / car.maxSpeed;

                if (onCurb && car.airHeight <= 0) {
                    engineNodes.terrainGain.gain.setTargetAtTime(
                        0.08 * speedFactor,
                        t,
                        0.02,
                    );
                    engineNodes.terrainFilter.frequency.setTargetAtTime(
                        1200,
                        t,
                        0.02,
                    );
                    engineNodes.terrainFilter.Q.setTargetAtTime(2, t, 0.02);
                } else if (!onTrack && car.airHeight <= 0) {
                    const isWater =
                        heightMap[tileRow] &&
                        heightMap[tileRow][tileCol] < BIOMES[0].max;
                    if (isWater) {
                        engineNodes.terrainGain.gain.setTargetAtTime(
                            0.1 * speedFactor,
                            t,
                            0.02,
                        );
                        engineNodes.terrainFilter.frequency.setTargetAtTime(
                            600,
                            t,
                            0.02,
                        );
                        engineNodes.terrainFilter.Q.setTargetAtTime(
                            0.5,
                            t,
                            0.02,
                        );
                    } else {
                        engineNodes.terrainGain.gain.setTargetAtTime(
                            0.05 * speedFactor,
                            t,
                            0.03,
                        );
                        engineNodes.terrainFilter.frequency.setTargetAtTime(
                            2000,
                            t,
                            0.03,
                        );
                        engineNodes.terrainFilter.Q.setTargetAtTime(1, t, 0.03);
                    }
                } else {
                    engineNodes.terrainGain.gain.setTargetAtTime(0, t, 0.05);
                }

                // AI car engines: throttle and volume based on distance to player
                for (
                    let i = 0;
                    i < aiCars.length && i < aiEngineNodes.length;
                    i++
                ) {
                    const ai = aiCars[i];
                    const dx = ai.col - car.col,
                        dy = ai.row - car.row;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const maxHearDist = 30;
                    if (dist < maxHearDist) {
                        const proximity = 1 - dist / maxHearDist;
                        aiEngineNodes[i].targetThrottle =
                            Math.abs(ai.speed) / ai.maxSpeed;
                        aiEngineNodes[i].volume = proximity * proximity * 0.5;
                    } else {
                        aiEngineNodes[i].volume = 0;
                        aiEngineNodes[i].targetThrottle = 0;
                    }
                }
            }

            // Start audio on first user interaction (browser requirement)
            function ensureAudio() {
                if (!audioCtx) initAudio();
                else if (audioCtx.state === "suspended") audioCtx.resume();
            }
            window.addEventListener("keydown", ensureAudio, { once: false });
            window.addEventListener("mousedown", ensureAudio, { once: false });
            window.addEventListener("gamepadconnected", ensureAudio);

            // ── Gamepad ───────────────────────────────────────────────────────────
            const gamepadState = {
                steer: 0,
                accel: 0,
                brake: 0,
                connected: false,
            };

            function pollGamepad() {
                const gamepads = navigator.getGamepads();
                let gp = null;
                for (let i = 0; i < gamepads.length; i++) {
                    if (gamepads[i]) {
                        gp = gamepads[i];
                        break;
                    }
                }
                if (!gp) {
                    gamepadState.connected = false;
                    return;
                }
                gamepadState.connected = true;

                gamepadState.gp = gp; // store ref for rumble

                // Left analog stick X axis for steering (axis 0 on standard gamepad)
                const deadzone = 0.15;
                let steer = gp.axes[0] || 0;
                if (Math.abs(steer) < deadzone) steer = 0;
                else
                    steer =
                        (steer - Math.sign(steer) * deadzone) / (1 - deadzone);
                gamepadState.steer = steer;

                // Right trigger (axis 5 or button 7) for acceleration
                // Left trigger (axis 4 or button 6) for braking
                // Triggers: axes go from -1 (released) to 1 (pressed) on some, or buttons 6/7 have .value 0-1
                if (gp.buttons[7]) {
                    gamepadState.accel = gp.buttons[7].value;
                } else {
                    const rt = gp.axes[5];
                    gamepadState.accel = rt !== undefined ? (rt + 1) / 2 : 0;
                }
                if (gp.buttons[6]) {
                    gamepadState.brake = gp.buttons[6].value;
                } else {
                    const lt = gp.axes[4];
                    gamepadState.brake = lt !== undefined ? (lt + 1) / 2 : 0;
                }
            }

            let rumbleTimeout = 0;
            function triggerRumble(strongMag, weakMag, duration) {
                if (!gamepadState.connected || !gamepadState.gp) return;
                const gp = gamepadState.gp;
                if (gp.vibrationActuator) {
                    gp.vibrationActuator
                        .playEffect("dual-rumble", {
                            startDelay: 0,
                            duration: duration,
                            weakMagnitude: Math.min(1, weakMag),
                            strongMagnitude: Math.min(1, strongMag),
                        })
                        .catch(() => {});
                }
            }

            function updateRumble(dt) {
                if (!gamepadState.connected) return;
                const speed = Math.abs(car.speed);
                if (speed < 1) return;

                const tileCol = Math.round(car.col),
                    tileRow = Math.round(car.row);
                const onTrack =
                    tileCol >= 0 &&
                    tileCol < MAP_SIZE &&
                    tileRow >= 0 &&
                    tileRow < MAP_SIZE &&
                    trackMap[tileRow][tileCol] > 0;
                const onCurb =
                    tileCol >= 0 &&
                    tileCol < MAP_SIZE &&
                    tileRow >= 0 &&
                    tileRow < MAP_SIZE &&
                    trackMap[tileRow][tileCol] === 2;

                // Terrain roughness: sample height changes for bumps
                const hHere = getTerrainHeight(car.col, car.row);
                const hAhead = getTerrainHeight(
                    car.col + Math.cos(car.angle) * 0.3,
                    car.row + Math.sin(car.angle) * 0.3,
                );
                const bump = Math.abs(hAhead - hHere);
                const speedFactor = speed / car.maxSpeed;

                rumbleTimeout -= dt;
                if (rumbleTimeout > 0) return;

                if (onCurb) {
                    // Curb rumble: rhythmic
                    triggerRumble(0.25 * speedFactor, 0.35 * speedFactor, 60);
                    rumbleTimeout = 0.1;
                } else if (!onTrack && car.airHeight <= 0) {
                    // Off-track: light rough terrain rumble
                    const rough = Math.min(1, bump * 2 + 0.1) * speedFactor;
                    triggerRumble(rough * 0.15, rough * 0.25, 80);
                    rumbleTimeout = 0.08;
                } else if (bump > 0.3 && car.airHeight <= 0) {
                    // On-track bump
                    triggerRumble(
                        bump * 0.1 * speedFactor,
                        bump * 0.2 * speedFactor,
                        50,
                    );
                    rumbleTimeout = 0.12;
                } else if (car.airHeight > 0 && car.vertVel < -2) {
                    // Landing impact
                    triggerRumble(0.4, 0.5, 120);
                    rumbleTimeout = 0.2;
                }
            }

            window.addEventListener("gamepadconnected", (e) => {
                gamepadState.connected = true;
                document.getElementById("hud").textContent =
                    "Gamepad connected | R to regenerate";
            });
            window.addEventListener("gamepaddisconnected", () => {
                gamepadState.connected = false;
                document.getElementById("hud").textContent =
                    "Arrow keys / WASD to drive | R to regenerate";
            });

            // ── Update ─────────────────────────────────────────────────────────────
            function snapAIToNearestPath(ai) {
                let bestDist = Infinity,
                    bestIdx = ai.pathIdx;
                const total = racePath.length;
                // Search the entire path to handle large displacements
                for (let i = 0; i < total; i++) {
                    const pt = racePath[i];
                    const dist = (ai.col - pt[0]) ** 2 + (ai.row - pt[1]) ** 2;
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestIdx = i;
                    }
                }
                ai.pathIdx = bestIdx;
            }

            function resolveCollisions() {
                const COLLISION_RADIUS = 1.8;
                const allCars = [car, ...aiCars];

                for (let i = 0; i < allCars.length; i++) {
                    for (let j = i + 1; j < allCars.length; j++) {
                        const a = allCars[i],
                            b = allCars[j];
                        // Skip if both airborne at different heights
                        if (a.airHeight > 1 || b.airHeight > 1) continue;

                        const dx = b.col - a.col,
                            dy = b.row - a.row;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < COLLISION_RADIUS && dist > 0.01) {
                            const overlap = COLLISION_RADIUS - dist;
                            const nx = dx / dist,
                                ny = dy / dist;

                            // Push apart
                            const pushFactor = 0.5;
                            a.col -= nx * overlap * pushFactor;
                            a.row -= ny * overlap * pushFactor;
                            b.col += nx * overlap * pushFactor;
                            b.row += ny * overlap * pushFactor;

                            // Speed exchange along collision normal
                            const aVelN =
                                (Math.cos(a.angle) * nx +
                                    Math.sin(a.angle) * ny) *
                                a.speed;
                            const bVelN =
                                (Math.cos(b.angle) * nx +
                                    Math.sin(b.angle) * ny) *
                                b.speed;

                            // Bounce: transfer momentum
                            const bounce = 0.6;
                            a.speed += (bVelN - aVelN) * bounce;
                            b.speed += (aVelN - bVelN) * bounce;

                            // Only nudge player angle, not AI (AI steering handles recovery)
                            const aAngleToB = Math.atan2(ny, nx);
                            if (a === car) {
                                let aDiff = aAngleToB - a.angle;
                                while (aDiff > Math.PI) aDiff -= Math.PI * 2;
                                while (aDiff < -Math.PI) aDiff += Math.PI * 2;
                                a.angle -= aDiff * 0.15;
                            }
                            if (b === car) {
                                let bDiff = aAngleToB + Math.PI - b.angle;
                                while (bDiff > Math.PI) bDiff -= Math.PI * 2;
                                while (bDiff < -Math.PI) bDiff += Math.PI * 2;
                                b.angle -= bDiff * 0.15;
                            }

                            // Snap AI path index to nearest point after collision
                            if (a.pathIdx !== undefined) snapAIToNearestPath(a);
                            if (b.pathIdx !== undefined) snapAIToNearestPath(b);
                        }
                    }
                }
            }

            function update(dt) {
                updateCountdown();
                // Expire the post-first-finish grace window
                if (race.firstFinishTime > 0 && !race.finished) {
                    if (performance.now() - race.firstFinishTime >= FINISH_WINDOW_MS) {
                        finalizeRace();
                    }
                }
                if (isCountingDown() || race.finished) {
                    // Cars frozen during countdown and after race finish
                    car.speed = 0;
                    for (const ai of aiCars) ai.speed = 0;
                    // Check gamepad for any button press to advance from results
                    if (race.finished) {
                        pollGamepad();
                        if (gamepadState.connected && gamepadState.gp) {
                            for (const btn of gamepadState.gp.buttons) {
                                if (btn.pressed) {
                                    generateWorld(Date.now());
                                    minimapCanvas = null;
                                    terrainChunks = null;
                                    buildTerrainCache();
                                    initCar();
                                    initAICars();
                                    resetRace();
                                    return;
                                }
                            }
                        }
                    }
                } else {
                    const playerDone = !!race.results.find(r => r.name === 'Player');
                    if (playerDone) {
                        // Player has crossed the finish — stop the car, disable input
                        car.speed = 0;
                    } else {
                        updateCar(dt);
                    }
                    updateAICars(dt);
                }
                resolveCollisions();
                updateRumble(dt);
                updateEngineSound(dt);

                // Camera follows car
                const elev = getTerrainHeight(car.col, car.row);
                const carScreenX = (car.col - car.row) * (TILE_W / 2);
                const carScreenY =
                    (car.col + car.row) * (TILE_H / 2) - elev * TILE_DEPTH;
                camera.targetX = carScreenX - canvas.width / 2;
                camera.targetY = carScreenY - canvas.height / 2;
                camera.x += (camera.targetX - camera.x) * 0.08;
                camera.y += (camera.targetY - camera.y) * 0.08;
            }

            // ── Terrain Cache (chunked) ────────────────────────────────────────
            let terrainChunks = null; // array of {canvas, ox, oy, w, h}

            function buildTerrainCache() {
                const W2 = TILE_W / 2,
                    H2 = TILE_H / 2;
                const pad = TILE_W;
                const minSX = -(MAP_SIZE - 1) * W2 - pad;
                const maxSX = (MAP_SIZE - 1) * W2 + pad;
                const minSY = -MAX_ELEVATION * TILE_DEPTH * 2 - pad;
                const maxSY =
                    (MAP_SIZE - 1) * 2 * H2 +
                    H2 +
                    MAX_ELEVATION * TILE_DEPTH +
                    pad;

                const totalW = Math.ceil(maxSX - minSX);
                const totalH = Math.ceil(maxSY - minSY);

                // Split into chunks that fit within 4096
                const maxChunk = 4096;
                const numCols = Math.ceil(totalW / maxChunk);
                const numRows = Math.ceil(totalH / maxChunk);
                const chunkW = Math.ceil(totalW / numCols);
                const chunkH = Math.ceil(totalH / numRows);

                const chunks = [];
                const savedCtx = ctx;
                const savedCamX = camera.x,
                    savedCamY = camera.y;

                for (let cr = 0; cr < numRows; cr++) {
                    for (let cc = 0; cc < numCols; cc++) {
                        const ox = minSX + cc * chunkW;
                        const oy = minSY + cr * chunkH;
                        const w = Math.min(chunkW, totalW - cc * chunkW);
                        const h = Math.min(chunkH, totalH - cr * chunkH);

                        const chunk = document.createElement("canvas");
                        chunk.width = w;
                        chunk.height = h;
                        const cctx = chunk.getContext("2d");

                        ctx = cctx;
                        camera.x = ox;
                        camera.y = oy;

                        for (let row = 0; row < MAP_SIZE; row++) {
                            for (let col = 0; col < MAP_SIZE; col++) {
                                const bx = (col - row) * W2 - ox;
                                const by = (col + row) * H2 - oy;
                                if (
                                    bx < -TILE_W ||
                                    bx > w + TILE_W ||
                                    by < -MAX_ELEVATION * TILE_DEPTH * 2 ||
                                    by > h + TILE_H + MAX_ELEVATION * TILE_DEPTH
                                )
                                    continue;
                                drawTile(col, row);
                                const sKey = `${row},${col}`;
                                const sItem = sceneryGrid && sceneryGrid[sKey];
                                if (sItem) drawSceneryItem(sItem);
                            }
                        }

                        chunks.push({ canvas: chunk, ox, oy, w, h });
                    }
                }

                camera.x = savedCamX;
                camera.y = savedCamY;
                ctx = savedCtx;
                terrainChunks = chunks;
            }

            // ── Render ─────────────────────────────────────────────────────────────
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (terrainChunks) {
                    for (const chunk of terrainChunks) {
                        // Chunk position on screen
                        const dx = chunk.ox - camera.x;
                        const dy = chunk.oy - camera.y;
                        // Skip chunks entirely off-screen
                        if (
                            dx + chunk.w < 0 ||
                            dx > canvas.width ||
                            dy + chunk.h < 0 ||
                            dy > canvas.height
                        )
                            continue;
                        ctx.drawImage(
                            chunk.canvas,
                            0,
                            0,
                            chunk.w,
                            chunk.h,
                            dx - 1,
                            dy - 1,
                            chunk.w + 2,
                            chunk.h + 2,
                        );
                    }
                } else {
                    const { minCol, maxCol, minRow, maxRow } =
                        getVisibleRange();
                    for (let row = minRow; row <= maxRow; row++) {
                        for (let col = minCol; col <= maxCol; col++) {
                            drawTile(col, row);
                            const sKey = `${row},${col}`;
                            const sItem = sceneryGrid && sceneryGrid[sKey];
                            if (sItem) drawSceneryItem(sItem);
                        }
                    }
                }
                drawStartFinish();
                if (showCheckpoints) drawCheckpoints();
                drawCheckpointFlags();

                // Draw all cars sorted by depth (back to front)
                const allCars = [
                    { obj: car, colors: PLAYER_COLORS },
                    ...aiCars.map((ai) => ({
                        obj: ai,
                        colors: AI_COLORS[ai.colorIdx],
                    })),
                ];
                allCars.sort(
                    (a, b) => a.obj.col + a.obj.row - (b.obj.col + b.obj.row),
                );
                for (const c of allCars) drawCarGeneric(c.obj, c.colors);

                drawMinimap();
            }

            // ── Minimap ───────────────────────────────────────────────────────────
            const MINIMAP_SIZE = 150;
            let minimapCanvas = null;

            function buildMinimapCache() {
                minimapCanvas = document.createElement("canvas");
                minimapCanvas.width = MINIMAP_SIZE;
                minimapCanvas.height = MINIMAP_SIZE;
                const mctx = minimapCanvas.getContext("2d");
                const scale = MINIMAP_SIZE / MAP_SIZE;

                // Background
                mctx.fillStyle = "rgba(0,0,0,0.6)";
                mctx.fillRect(0, 0, MINIMAP_SIZE, MINIMAP_SIZE);

                // Track tiles
                mctx.fillStyle = "rgba(80,80,90,0.9)";
                for (let r = 0; r < MAP_SIZE; r++) {
                    for (let c = 0; c < MAP_SIZE; c++) {
                        if (trackMap[r][c] === 1) {
                            mctx.fillRect(
                                c * scale,
                                r * scale,
                                Math.ceil(scale),
                                Math.ceil(scale),
                            );
                        }
                    }
                }

                // Curbs
                mctx.fillStyle = "rgba(200,60,60,0.7)";
                for (let r = 0; r < MAP_SIZE; r++) {
                    for (let c = 0; c < MAP_SIZE; c++) {
                        if (trackMap[r][c] === 2) {
                            mctx.fillRect(
                                c * scale,
                                r * scale,
                                Math.ceil(scale),
                                Math.ceil(scale),
                            );
                        }
                    }
                }

                // Border
                mctx.strokeStyle = "rgba(255,255,255,0.3)";
                mctx.lineWidth = 1;
                mctx.strokeRect(0, 0, MINIMAP_SIZE, MINIMAP_SIZE);
            }

            function drawMinimap() {
                if (!minimapCanvas) buildMinimapCache();

                const pad = 10;
                const mx = canvas.width - MINIMAP_SIZE - pad;
                const my = canvas.height - MINIMAP_SIZE - pad;
                const scale = MINIMAP_SIZE / MAP_SIZE;

                // Draw cached track image
                ctx.drawImage(minimapCanvas, mx, my);

                // Draw AI cars
                const aiDotColors = ["#2080e0", "#20c040", "#e0a020"];
                for (let i = 0; i < aiCars.length; i++) {
                    const ai = aiCars[i];
                    ctx.beginPath();
                    ctx.arc(
                        mx + ai.col * scale,
                        my + ai.row * scale,
                        3,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fillStyle = aiDotColors[ai.colorIdx] || "#fff";
                    ctx.fill();
                }

                // Draw player car (on top, slightly larger)
                ctx.beginPath();
                ctx.arc(
                    mx + car.col * scale,
                    my + car.row * scale,
                    4,
                    0,
                    Math.PI * 2,
                );
                ctx.fillStyle = "#ff3030";
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            // ── FPS Graph ─────────────────────────────────────────────────────────
            function drawFPSGraph() {
                const gw = 160,
                    gh = 60,
                    gx = canvas.width - gw - 10,
                    gy = 100;
                const current =
                    fpsHistory.length > 0
                        ? fpsHistory[fpsHistory.length - 1]
                        : 0;

                // Background
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(gx, gy, gw, gh + 20);

                // FPS text
                ctx.fillStyle =
                    current >= 50 ? "#4f4" : current >= 30 ? "#ff4" : "#f44";
                ctx.font = "12px monospace";
                ctx.textAlign = "left";
                ctx.fillText(`FPS: ${Math.round(current)}`, gx + 4, gy + 14);

                // Graph
                if (fpsHistory.length < 2) return;
                const maxFPS = 80;
                ctx.beginPath();
                for (let i = 0; i < fpsHistory.length; i++) {
                    const x = gx + (i / (FPS_HISTORY_MAX - 1)) * gw;
                    const y =
                        gy + 20 + gh - Math.min(fpsHistory[i] / maxFPS, 1) * gh;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = "#4f4";
                ctx.lineWidth = 1;
                ctx.stroke();

                // 60fps line
                const y60 = gy + 20 + gh - (60 / maxFPS) * gh;
                ctx.beginPath();
                ctx.moveTo(gx, y60);
                ctx.lineTo(gx + gw, y60);
                ctx.strokeStyle = "rgba(255,255,255,0.3)";
                ctx.setLineDash([3, 3]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // ── Game Loop ──────────────────────────────────────────────────────────
            let lastTime = 0;

            function gameLoop(timestamp) {
                const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
                lastTime = timestamp;

                if (dt > 0) {
                    fpsHistory.push(1 / dt);
                    if (fpsHistory.length > FPS_HISTORY_MAX) fpsHistory.shift();
                }

                update(dt);
                render();

                drawCountdown();
                drawPlayerFinishCountdown();
                drawResultsTable();
                if (showFPS) drawFPSGraph();
                if (showTuning) drawTuningPanel();

                requestAnimationFrame(gameLoop);
            }

            // ── Init ───────────────────────────────────────────────────────────────
            generateWorld(42);
            buildTerrainCache();
            initCar();
            initAICars();
            resetRace();
            // Snap camera to car immediately
            const initElev = getTerrainHeight(car.col, car.row);
            camera.x = camera.targetX =
                (car.col - car.row) * (TILE_W / 2) - canvas.width / 2;
            camera.y = camera.targetY =
                (car.col + car.row) * (TILE_H / 2) -
                initElev * TILE_DEPTH -
                canvas.height / 2;
            requestAnimationFrame(gameLoop);
        </script>
    </body>
</html>
