                        ctx.beginPath();
                        ctx.moveTo(topX, topY);
                        ctx.lineTo(bottomX, bottomY);
                        ctx.lineTo(leftX, leftY);
                        ctx.closePath();
                        ctx.fillStyle = rgb(
                            rightHalf ? topColor : otherColor,
                            bright,
                        );
                        ctx.fill();

                        ctx.beginPath();
                        ctx.moveTo(topX, topY);
                        ctx.lineTo(rightX, rightY);
                        ctx.lineTo(bottomX, bottomY);
                        ctx.closePath();
                        ctx.fillStyle = rgb(
                            rightHalf ? otherColor : topColor,
                            bright,
                        );
                        ctx.fill();
                    } else {
                        const topHalf = trackSide[3] && trackSide[0];

                        ctx.beginPath();
                        ctx.moveTo(leftX, leftY);
                        ctx.lineTo(topX, topY);
                        ctx.lineTo(rightX, rightY);
                        ctx.closePath();
                        ctx.fillStyle = rgb(
                            topHalf ? otherColor : topColor,
                            bright,
                        );
                        ctx.fill();

                        ctx.beginPath();
                        ctx.moveTo(leftX, leftY);
                        ctx.lineTo(rightX, rightY);
                        ctx.lineTo(bottomX, bottomY);
                        ctx.closePath();
                        ctx.fillStyle = rgb(
                            topHalf ? topColor : otherColor,
                            bright,
                        );
                        ctx.fill();
                    }
                }

                // Right side face (right → bottom edge, extending down to ground)
                const rightSideH = Math.max(eRight, eBottom) * TILE_DEPTH;

                if (rightSideH > 1) {
                    const rightGroundY = by;
                    const bottomGroundY = by + TILE_H / 2;
                    ctx.beginPath();
                    ctx.moveTo(rightX, rightY);
                    ctx.lineTo(bottomX, bottomY);
                    ctx.lineTo(bottomX, bottomGroundY);
                    ctx.lineTo(rightX, rightGroundY);
                    ctx.closePath();
                    ctx.fillStyle = rgb(rightColor, bright);
                    ctx.fill();
                }

                // Left side face (left → bottom edge, extending down to ground)
                const leftSideH = Math.max(eLeft, eBottom) * TILE_DEPTH;

                if (leftSideH > 1) {
                    const leftGroundY = by;
                    const bottomGroundY = by + TILE_H / 2;
                    ctx.beginPath();
                    ctx.moveTo(leftX, leftY);
                    ctx.lineTo(bottomX, bottomY);
                    ctx.lineTo(bottomX, bottomGroundY);
                    ctx.lineTo(leftX, leftGroundY);
                    ctx.closePath();
                    ctx.fillStyle = rgb(leftColor, bright);
                    ctx.fill();
                }
            }

            // ── Car ────────────────────────────────────────────────────────────────
            const car = {
                col: 0,
                row: 0,
                prevCol: 0,
                prevRow: 0, // previous frame position for line crossing
                angle: 0,
                speed: 0,
                maxSpeed: 25,
                accel: 18,
                brake: 30,
                friction: 8,
                turnSpeed: 2.5,
                // Jump physics
                airHeight: 0, // vertical offset from launch altitude (0 when on ground)
                vertVel: 0, // vertical velocity
                prevSlope: 0, // previous frame slope in travel direction
                gravity: 30,
                jumpBaseH: 0, // absolute world altitude at launch (for ramp jumps)
                airborne: false,
            };

            function getTerrainHeight(c, r) {
                const vx = c + 0.5,
                    vy = r + 0.5;
                const ix = Math.floor(vx),
                    iy = Math.floor(vy);
                const fx = vx - ix,
                    fy = vy - iy;
                const cx2 = (x) => Math.max(0, Math.min(MAP_SIZE, x));
                const cy2 = (y) => Math.max(0, Math.min(MAP_SIZE, y));
                const e00 = vertexElev[cy2(iy)][cx2(ix)];
                const e10 = vertexElev[cy2(iy)][cx2(ix + 1)];
                const e01 = vertexElev[cy2(iy + 1)][cx2(ix)];
                const e11 = vertexElev[cy2(iy + 1)][cx2(ix + 1)];
                const top = e00 + (e10 - e00) * fx;
                const bot = e01 + (e11 - e01) * fx;
                return Math.max(top + (bot - top) * fy, WATER_LEVEL);
            }

            function getStartFormation() {
                // Returns grid positions behind start/finish line
                // Track direction is perpendicular to checkpoint normal
                const cp = checkpoints[0];
                // Track forward direction (direction of travel)
                const fwdX = -cp.ny;
                const fwdY = cp.nx;
                // Check if forward aligns with racePath direction
                const wp0 = racePath[0], wp1 = racePath[1];
                const pathDx = wp1[0] - wp0[0], pathDy = wp1[1] - wp0[1];
                const dot = fwdX * pathDx + fwdY * pathDy;
                const dirX = dot >= 0 ? fwdX : -fwdX;
                const dirY = dot >= 0 ? fwdY : -fwdY;
                // Lateral direction (across track)
                const latX = cp.nx;
                const latY = cp.ny;
                // Track half-width
                const halfW = Math.min(cp.dPos, cp.dNeg) * 0.3;
                // Distance from start line to front row, and gap between rows
                const lineOffset = 6;
                const rowGap = 5;

                // 4 positions: 2 rows of 2, row 0 is front, row 1 is back
                return [
                    // Row 0 (front): AI cars
                    { col: cp.col - dirX * lineOffset + latX * halfW,
                      row: cp.row - dirY * lineOffset + latY * halfW },
                    { col: cp.col - dirX * lineOffset - latX * halfW,
                      row: cp.row - dirY * lineOffset - latY * halfW },
                    // Row 1 (back): AI car + player
                    { col: cp.col - dirX * (lineOffset + rowGap) + latX * halfW,
                      row: cp.row - dirY * (lineOffset + rowGap) + latY * halfW },
                    { col: cp.col - dirX * (lineOffset + rowGap) - latX * halfW,
                      row: cp.row - dirY * (lineOffset + rowGap) - latY * halfW },
                ];
            }

            function initCar() {
                const formation = getStartFormation();
                // Player is last position (back row, right side)
                const pos = formation[3];
                const cp = checkpoints[0];
                const wp0 = racePath[0], wp1 = racePath[1];
                const fwdX = -cp.ny, fwdY = cp.nx;
                const dot = fwdX * (wp1[0] - wp0[0]) + fwdY * (wp1[1] - wp0[1]);
                const dirX = dot >= 0 ? fwdX : -fwdX;
                const dirY = dot >= 0 ? fwdY : -fwdY;

                car.col = car.prevCol = pos.col;
                car.row = car.prevRow = pos.row;
                car.angle = Math.atan2(dirY, dirX);
                car.speed = 0;
                car.airHeight = 0;
                car.vertVel = 0;
                car.prevSlope = 0;
                car.airborne = false;
                car.jumpBaseH = 0;
            }

            function updateCar(dt) {
                car.prevCol = car.col;
                car.prevRow = car.row;
                pollGamepad();

                const airFactor = car.airHeight > 0 ? 0.2 : 1; // reduced steering in air

                // Steering: keyboard + gamepad right stick
                let steerInput = 0;
                let keyboardSteer = false;
                if (keys.has("ArrowLeft") || keys.has("a")) { steerInput -= 1; keyboardSteer = true; }
                if (keys.has("ArrowRight") || keys.has("d")) { steerInput += 1; keyboardSteer = true; }
                if (gamepadState.connected && Math.abs(gamepadState.steer) > 0) {
                    steerInput = gamepadState.steer;
                    keyboardSteer = false;
                }
                // Keyboard: smoothly scale turn rate with speed so high-speed
                // corners are responsive without low-speed feeling sluggish.
                let speedTurnMul = 1;
                if (keyboardSteer) {
                    const sf = Math.min(1, Math.abs(car.speed) / car.maxSpeed);
                    const s = sf * sf * (3 - 2 * sf); // smoothstep
                    speedTurnMul = 0.4 + 0.7 * s; // 0.4 at crawl → 1.1 at top speed
                }
                car.angle +=
                    steerInput *
                    car.turnSpeed *
                    speedTurnMul *
                    dt *
                    (car.speed !== 0 ? 1 : 0) *
                    airFactor;

                // Acceleration/braking: keyboard + gamepad analog triggers
                let accelInput = 0,
                    brakeInput = 0;
                if (keys.has("ArrowUp") || keys.has("w")) accelInput = 1;
                if (keys.has("ArrowDown") || keys.has("s")) brakeInput = 1;
                if (gamepadState.connected) {
                    if (gamepadState.accel > 0.05)
                        accelInput = Math.max(accelInput, gamepadState.accel);
                    if (gamepadState.brake > 0.05)
                        brakeInput = Math.max(brakeInput, gamepadState.brake);
                }

                if (accelInput > 0) {
                    car.speed += car.accel * accelInput * dt;
                } else if (brakeInput > 0) {
                    car.speed -= car.brake * brakeInput * dt;
                } else {
                    if (car.speed > 0)
                        car.speed = Math.max(0, car.speed - car.friction * dt);
                    else if (car.speed < 0)
                        car.speed = Math.min(0, car.speed + car.friction * dt);
                }
                car.speed = Math.max(
                    -car.maxSpeed * 0.4,
                    Math.min(car.maxSpeed, car.speed),
                );

                // Off-track penalty: heavy friction when not on the track
                const tileCol = Math.round(car.col),
                    tileRow = Math.round(car.row);
                const onTrack =
                    tileCol >= 0 &&
                    tileCol < MAP_SIZE &&
                    tileRow >= 0 &&
                    tileRow < MAP_SIZE &&
                    trackMap[tileRow][tileCol] > 0;
                if (!onTrack && car.airHeight <= 0) {
                    car.speed *= 1 - _tuneBounce.offDrag * dt; // drag off-track
                    car.speed = Math.max(
                        -car.maxSpeed * 0.15,
                        Math.min(car.maxSpeed * 0.3, car.speed),
                    );
                }

                // Slope resistance (only when on ground)
                const hNow = getTerrainHeight(car.col, car.row);
                const hAhead = getTerrainHeight(
                    car.col + Math.cos(car.angle) * 0.5,
                    car.row + Math.sin(car.angle) * 0.5,
                );

                if (car.airHeight <= 0) {
                    const slope = hAhead - hNow;
                    car.speed -= slope * 25 * dt;
                    // Rough terrain drag: bumpy ground slows you down
                    const roughness = Math.abs(slope);
                    if (roughness > 0.1) {
                        car.speed *= 1 - roughness * 2 * dt;
                    }
                }

                car.col += Math.cos(car.angle) * car.speed * dt;
                car.row += Math.sin(car.angle) * car.speed * dt;
                car.col = Math.max(0, Math.min(MAP_SIZE - 1, car.col));
                car.row = Math.max(0, Math.min(MAP_SIZE - 1, car.row));

                // Track boundary: hard wall — car can never leave the track
                if (!car.bounceCooldown) car.bounceCooldown = 0;
                car.bounceCooldown = Math.max(0, car.bounceCooldown - dt);
                const newTC = Math.round(car.col),
                    newTR = Math.round(car.row);
                if (
                    newTC >= 0 &&
                    newTC < MAP_SIZE &&
                    newTR >= 0 &&
                    newTR < MAP_SIZE
                ) {
                    const tile = trackMap[newTR][newTC];
                    // If car is on curb or off-track (even while airborne), push back
                    if (tile !== 1) {
                        // Find direction back to track center by checking neighbors
                        let pushX = 0,
                            pushY = 0;
                        for (let dr = -2; dr <= 2; dr++) {
                            for (let dc = -2; dc <= 2; dc++) {
                                const nr = newTR + dr,
                                    nc = newTC + dc;
                                if (
                                    nr >= 0 &&
                                    nr < MAP_SIZE &&
                                    nc >= 0 &&
                                    nc < MAP_SIZE &&
                                    trackMap[nr][nc] === 1
                                ) {
                                    const dist =
                                        Math.sqrt(dc * dc + dr * dr) || 1;
                                    pushX += dc / (dist * dist);
                                    pushY += dr / (dist * dist);
                                }
                            }
                        }
                        const pushLen = Math.sqrt(
                            pushX * pushX + pushY * pushY,
                        );
                        if (pushLen > 0) {
                            pushX /= pushLen;
                            pushY /= pushLen;
                            // Always snap back to previous valid position + push toward track
                            car.col = car.prevCol + pushX * _tuneBounce.push;
                            car.row = car.prevRow + pushY * _tuneBounce.push;
                            // Cancel any air — landing on boundary
                            if (car.airborne) {
                                car.airHeight = 0;
                                car.vertVel = 0;
                                car.airborne = false;
                                car.jumpBaseH = 0;
                            }
                            // Bounce backward (only apply speed penalty with cooldown to avoid stutter)
                            if (car.bounceCooldown <= 0) {
                                car.speed =
                                    -Math.abs(car.speed) * _tuneBounce.speedMul;
                                car.bounceCooldown = _tuneBounce.cooldown;
                                const impactForce = Math.min(
                                    1,
                                    Math.abs(car.speed) / car.maxSpeed,
                                );
                                triggerRumble(
                                    impactForce * 0.6,
                                    impactForce * 0.8,
                                    200,
                                );
                            }
                        }
                    }
                }

                // Jump physics: detect crests by slope change in travel direction
                const sampleDist = 0.8;
                const hBehind = getTerrainHeight(
                    car.col - Math.cos(car.angle) * sampleDist,
                    car.row - Math.sin(car.angle) * sampleDist,
                );
                const hHere = getTerrainHeight(car.col, car.row);
                const hFront = getTerrainHeight(
                    car.col + Math.cos(car.angle) * sampleDist,
                    car.row + Math.sin(car.angle) * sampleDist,
                );

                // Current slope: positive = going uphill
                const slopeBehind = hHere - hBehind; // slope we just traveled
                const slopeAhead = hFront - hHere; // slope coming up
                // Crest = was going up, now going down (or steep down after flat)
                const slopeChange = slopeBehind - slopeAhead; // positive at crests

                if (!car.airborne) {
                    const absSpeed = Math.abs(car.speed);
                    const speedFactor = absSpeed / car.maxSpeed;
                    // Ramp lip: explicit launch tiles trigger a reliable jump
                    const tc = Math.round(car.col),
                        tr = Math.round(car.row);
                    const ramp =
                        tr >= 0 && tr < MAP_SIZE && tc >= 0 && tc < MAP_SIZE
                            ? rampLaunch[tr][tc]
                            : 0;
                    if (ramp > 0 && speedFactor > 0.2) {
                        car.vertVel = Math.min(ramp * (0.5 + speedFactor), 18);
                        car.airHeight = 0.01;
                        car.jumpBaseH = getTerrainHeight(car.col, car.row);
                        car.airborne = true;
                    } else if (slopeChange > 0.04 && speedFactor > 0.15) {
                        // Crest detection for regular terrain bumps
                        car.vertVel = Math.min(
                            slopeChange * speedFactor * 55,
                            12,
                        );
                        car.airHeight = 0.01;
                        car.jumpBaseH = getTerrainHeight(car.col, car.row);
                        car.airborne = true;
                    }
                }

                if (car.airborne) {
                    car.vertVel -= car.gravity * dt;
                    car.airHeight += car.vertVel * dt;
                    // Cap max absolute jump arc height
                    if (car.airHeight > 10) {
                        car.airHeight = 10;
                        if (car.vertVel > 0) car.vertVel = 0;
                    }
                    // Apply drag while airborne off-track so car can't fly away
                    if (!onTrack) {
                        car.speed *= 1 - 3 * dt;
                    }

                    // Landing: when absolute altitude drops back to current terrain
                    const groundH = getTerrainHeight(car.col, car.row);
                    if (car.jumpBaseH + car.airHeight <= groundH) {
                        car.airborne = false;
                        car.airHeight = 0;
                        car.vertVel = 0;
                        car.jumpBaseH = 0;
                    }
                }

                // Checkpoint crossing detection
                updateCheckpoints();
            }

            // Line segment intersection: does segment (p1->p2) cross segment (p3->p4)?
            function segmentsIntersect(p1x, p1y, p2x, p2y, p3x, p3y, p4x, p4y) {
                const d1x = p2x - p1x,
                    d1y = p2y - p1y;
                const d2x = p4x - p3x,
                    d2y = p4y - p3y;
                const denom = d1x * d2y - d1y * d2x;
                if (Math.abs(denom) < 0.0001) return false;
                const t = ((p3x - p1x) * d2y - (p3y - p1y) * d2x) / denom;
                const u = ((p3x - p1x) * d1y - (p3y - p1y) * d1x) / denom;
                return t >= 0 && t <= 1 && u >= 0 && u <= 1;
            }

            function updateCheckpoints() {
                if (checkpoints.length === 0) return;
                const cp = checkpoints[race.nextCheckpoint];

                // Gate line endpoints using actual measured edge distances
                const g1c = cp.col + cp.nx * cp.dPos,
                    g1r = cp.row + cp.ny * cp.dPos;
                const g2c = cp.col - cp.nx * cp.dNeg,
                    g2r = cp.row - cp.ny * cp.dNeg;

                // Check if car's movement path (prevPos -> curPos) crosses the gate line
                if (
                    segmentsIntersect(
                        car.prevCol,
                        car.prevRow,
                        car.col,
                        car.row,
                        g1c,
                        g1r,
                        g2c,
                        g2r,
                    )
                ) {
                    if (race.nextCheckpoint === 0) {
                        if (
                            race.raceStarted &&
                            race.checkpointsPassed >= race.totalCheckpoints - 1
                        ) {
                            const lapTime =
                                performance.now() - race.lapStartTime;
                            if (lapTime < race.bestTime)
                                race.bestTime = lapTime;
                            race.lap++;
                            // Check if player finished the race
                            if (race.lap >= TOTAL_LAPS && !race.finished) {
                                const playerFinished = race.results.find(r => r.name === 'Player');
                                if (!playerFinished) {
                                    race.results.push({
                                        name: 'Player',
                                        color: PLAYER_COLORS.top,
                                        time: performance.now() - race.raceStartAbsolute,
                                    });
                                    if (race.firstFinishTime === 0) {
                                        race.firstFinishTime = performance.now();
                                    }
                                }
                                // Only finalize now if everyone has already finished
                                if (race.results.length >= 1 + aiCars.length) {
                                    finalizeRace();
                                }
                            }
                        }
                        race.raceStarted = true;
                        race.lapStartTime = performance.now();
                        race.checkpointsPassed = 0;
                    } else {
                        race.checkpointsPassed++;
                    }
                    race.nextCheckpoint =
                        (race.nextCheckpoint + 1) % checkpoints.length;
                }

                // Update HUD
                document.getElementById("lap-num").textContent = Math.min(race.lap + 1, TOTAL_LAPS) + '/' + TOTAL_LAPS;
                document.getElementById("cp-count").textContent =
                    race.checkpointsPassed;
                document.getElementById("cp-total").textContent =
                    race.totalCheckpoints;

                if (race.raceStarted) {
                    const elapsed = performance.now() - race.lapStartTime;
                    document.getElementById("lap-time").textContent =
                        formatTime(elapsed);
                }
                if (race.bestTime < Infinity) {
                    document.getElementById("best-time").textContent =
                        formatTime(race.bestTime);
                }
            }

            function formatTime(ms) {
                const totalSec = ms / 1000;
                const min = Math.floor(totalSec / 60);
                const sec = totalSec % 60;
                return min + ":" + sec.toFixed(1).padStart(4, "0");
            }

            // ── Countdown ──────────────────────────────────────────────────────
            let countdown = { active: false, startTime: 0, lights: 0, go: false, goTime: 0 };

            function startCountdown() {
                countdown.active = true;
                countdown.startTime = performance.now();
                countdown.lights = 0;
                countdown.go = false;
                countdown.goTime = 0;
            }

            function updateCountdown() {
                if (!countdown.active) return;
                const elapsed = (performance.now() - countdown.startTime) / 1000;
                if (elapsed < 1) countdown.lights = 0;
                else if (elapsed < 2) countdown.lights = 1;
                else if (elapsed < 3) countdown.lights = 2;
                else if (elapsed < 4) countdown.lights = 3;
                else {
                    // GO!
                    if (!countdown.go) {
                        countdown.go = true;
                        countdown.goTime = performance.now();
                        race.raceStartAbsolute = performance.now();
                    }
                    // Hide GO after 1 second
                    if (performance.now() - countdown.goTime > 1000) {
                        countdown.active = false;
                    }
                }
            }

            function isCountingDown() {
                return countdown.active && !countdown.go;
            }

            function drawCountdown() {
                if (!countdown.active) return;
                const cx = canvas.width / 2;
                const cy = canvas.height / 3;
                const lightR = 20;
                const gap = 60;
                const totalW = gap * 2;

                // Background panel
                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                const panelW = totalW + lightR * 2 + 40;
                const panelH = lightR * 2 + 30;
                ctx.beginPath();
                ctx.roundRect(cx - panelW / 2, cy - panelH / 2, panelW, panelH, 10);
                ctx.fill();
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Three lights
                for (let i = 0; i < 3; i++) {
                    const lx = cx - gap + i * gap;
                    ctx.beginPath();
                    ctx.arc(lx, cy, lightR, 0, Math.PI * 2);
                    if (i < countdown.lights) {
                        ctx.fillStyle = '#ee2222';
                        ctx.shadowColor = '#ff0000';
                        ctx.shadowBlur = 15;
                    } else {
                        ctx.fillStyle = '#331111';
                        ctx.shadowBlur = 0;
                    }
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // GO text
                if (countdown.go) {
                    ctx.font = 'bold 60px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#22ee22';
                    ctx.shadowColor = '#00ff00';
                    ctx.shadowBlur = 20;
                    ctx.fillText('GO!', cx, cy + 20);
                    ctx.shadowBlur = 0;
                }
            }

            function drawPlayerFinishCountdown() {
                // Shown when an AI has finished first but the player hasn't finished yet
                if (race.finished) return;
                if (race.firstFinishTime === 0) return;
                const playerDone = !!race.results.find(r => r.name === 'Player');
                if (playerDone) return;

                const remaining = Math.max(0, FINISH_WINDOW_MS - (performance.now() - race.firstFinishTime));
                const cx = canvas.width / 2;
                const cy = 60;
                const panelW = 340;
                const panelH = 56;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
                ctx.beginPath();
                ctx.roundRect(cx - panelW / 2, cy - panelH / 2, panelW, panelH, 10);
                ctx.fill();
                ctx.strokeStyle = '#ffcc00';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.textAlign = 'center';
                ctx.font = 'bold 14px monospace';
                ctx.fillStyle = '#ccc';
                ctx.fillText('FINISH BEFORE', cx, cy - 8);
                ctx.font = 'bold 24px monospace';
                ctx.fillStyle = remaining < 3000 ? '#ff4444' : '#ffcc00';
                ctx.fillText((remaining / 1000).toFixed(1) + 's', cx, cy + 18);
            }

            function drawResultsTable() {
                const playerDone = !!race.results.find(r => r.name === 'Player');
                const inGraceWindow = race.firstFinishTime > 0 && !race.finished && playerDone;
                if (!race.finished && !inGraceWindow) return;
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const rowH = 40;
                const panelW = 380;
                const headerH = 50;
                const panelH = headerH + race.results.length * rowH + 50;

                // Sort: finishers by time ascending, DNFs at the bottom
                const sorted = [...race.results].sort((a, b) => {
                    const aDnf = !isFinite(a.time);
                    const bDnf = !isFinite(b.time);
                    if (aDnf && !bDnf) return 1;
                    if (!aDnf && bDnf) return -1;
                    return a.time - b.time;
                });

                // Background
                ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                ctx.beginPath();
                ctx.roundRect(cx - panelW / 2, cy - panelH / 2, panelW, panelH, 14);
                ctx.fill();
                ctx.strokeStyle = '#ffcc00';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Title
                ctx.font = 'bold 24px monospace';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffcc00';
                ctx.fillText('RACE RESULTS', cx, cy - panelH / 2 + 35);

                // Column headers
                const tableTop = cy - panelH / 2 + headerH + 10;
                ctx.font = 'bold 14px monospace';
                ctx.fillStyle = '#888';
                ctx.textAlign = 'left';
                ctx.fillText('POS', cx - panelW / 2 + 20, tableTop);
                ctx.fillText('NAME', cx - panelW / 2 + 70, tableTop);
                ctx.fillText('TOTAL TIME', cx + panelW / 2 - 130, tableTop);

                // Rows
                for (let i = 0; i < sorted.length; i++) {
                    const r = sorted[i];
                    const y = tableTop + (i + 1) * rowH;

                    // Highlight row
                    if (r.name === 'Player') {
                        ctx.fillStyle = 'rgba(255, 255, 100, 0.1)';
                        ctx.fillRect(cx - panelW / 2 + 10, y - 20, panelW - 20, rowH - 4);
                    }

                    // Position
                    ctx.font = 'bold 18px monospace';
                    ctx.fillStyle = i === 0 ? '#ffcc00' : '#ccc';
                    ctx.textAlign = 'left';
                    ctx.fillText((i + 1) + '.', cx - panelW / 2 + 20, y);

                    // Color swatch
                    ctx.fillStyle = r.color;
                    ctx.fillRect(cx - panelW / 2 + 58, y - 12, 16, 16);
                    ctx.strokeStyle = '#555';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(cx - panelW / 2 + 58, y - 12, 16, 16);

                    // Name
                    ctx.fillStyle = r.name === 'Player' ? '#fff' : '#ccc';
                    ctx.font = r.name === 'Player' ? 'bold 16px monospace' : '16px monospace';
                    ctx.fillText(r.name, cx - panelW / 2 + 82, y);

                    // Time (or DNF)
                    const isDnf = !isFinite(r.time);
                    ctx.fillStyle = isDnf ? '#c55' : (i === 0 ? '#ffcc00' : '#aaa');
                    ctx.fillText(isDnf ? 'DNF' : formatTime(r.time), cx + panelW / 2 - 130, y);
                }

                // Footer
                ctx.textAlign = 'center';
                if (inGraceWindow) {
                    const remaining = Math.max(0, FINISH_WINDOW_MS - (performance.now() - race.firstFinishTime));
                    ctx.font = 'bold 14px monospace';
                    ctx.fillStyle = '#ffcc00';
                    ctx.fillText('Waiting for other cars: ' + (remaining / 1000).toFixed(1) + 's', cx, cy + panelH / 2 - 15);
                } else {
                    ctx.font = '12px monospace';
                    ctx.fillStyle = '#666';
                    ctx.fillText('Press any key for next race', cx, cy + panelH / 2 - 15);
                }
            }

            function finalizeRace() {
                if (race.finished) return;
                // Fill in DNF entries for anyone who hasn't finished
                if (!race.results.find(r => r.name === 'Player')) {
                    race.results.push({
                        name: 'Player',
                        color: PLAYER_COLORS.top,
                        time: Infinity,
                    });
                }
                for (const ai of aiCars) {
                    const name = AI_NAMES[ai.colorIdx];
                    if (!race.results.find(r => r.name === name)) {
                        race.results.push({
                            name: name,
                            color: AI_COLORS[ai.colorIdx].top,
                            time: Infinity,
                        });
                    }
                }
                race.finished = true;
            }

            function resetRace() {
                race.lap = 0;
                race.lapStartTime = 0;
                race.bestTime = Infinity;
                race.nextCheckpoint = 0;
                race.checkpointsPassed = 0;
                race.raceStarted = false;
                race.raceStartAbsolute = 0;
                race.firstFinishTime = 0;
                race.finished = false;
                race.results = [];
                startCountdown();
            }

            // Project a world-space point (col, row, elevation) to screen
            function toScreen(c, r, e) {
                return [
                    (c - r) * (TILE_W / 2) - camera.x,
                    (c + r) * (TILE_H / 2) - e * TILE_DEPTH - camera.y,
                ];
            }

            // ── AI Cars ────────────────────────────────────────────────────────────
            const AI_COLORS = [
                {
                    top: "#2080e0",
                    side: "#1860b0",
                    dark: "#1050a0",
                    stroke: "#0a3070",
                },
                {
                    top: "#20c040",
                    side: "#18a030",
                    dark: "#108020",
                    stroke: "#086018",
                },
                {
                    top: "#e0a020",
                    side: "#c08018",
                    dark: "#a06010",
                    stroke: "#705008",
                },
            ];

            const aiCars = [];

            function initAICars() {
                aiCars.length = 0;
                const formation = getStartFormation();
                const cp = checkpoints[0];
                const wp0 = racePath[0], wp1 = racePath[1];
                const fwdX = -cp.ny, fwdY = cp.nx;
                const dot = fwdX * (wp1[0] - wp0[0]) + fwdY * (wp1[1] - wp0[1]);
                const dirX = dot >= 0 ? fwdX : -fwdX;
                const dirY = dot >= 0 ? fwdY : -fwdY;
                const angle = Math.atan2(dirY, dirX);

                // Find nearest path index for each formation position
                const totalPts = racePath.length;
                function nearestPathIdx(col, row) {
                    let best = 0, bestDist = Infinity;
                    for (let j = 0; j < totalPts; j++) {
                        const dx = racePath[j][0] - col, dy = racePath[j][1] - row;
                        const d = dx * dx + dy * dy;
                        if (d < bestDist) { bestDist = d; best = j; }
                    }
                    return best;
                }

                // Initial pathIdx: ~6 path points past the start line in the
                // direction of travel. Using raw "nearest" on the back-row
                // formation position can snap to the wrong leg of the track
                // (especially on figure-8), making the AI drive in circles.
                const startLineIdx = nearestPathIdx(cp.col, cp.row);
                const initialPathIdx = (startLineIdx + 6) % totalPts;

                // AI cars take positions 0, 1, 2 (front row left, front row right, back row left)
                for (let i = 0; i < 3; i++) {
                    const pos = formation[i];
                    aiCars.push({
                        col: pos.col,
                        row: pos.row,
                        prevCol: pos.col,
                        prevRow: pos.row,
                        angle: angle,
                        speed: 0,
                        pathIdx: initialPathIdx,
                        reachedFarSide: false,
                        airHeight: 0,
                        vertVel: 0,
                        jumpBaseH: 0,
                        airborne: false,
                        colorIdx: i,
                        maxSpeed: 14 + i * 2,
                        lap: 0,
                        crossedStart: false,
                    });
                }
            }

            const AI_NAMES = ['Blue', 'Green', 'Gold'];

            function updateAICars(dt) {
                const totalPts = racePath.length;
                for (const ai of aiCars) {
                    ai.prevCol = ai.col;
                    ai.prevRow = ai.row;

                    // Target: look further ahead at higher speeds so fast AI
                    // (Gold at maxSpeed 18) don't oscillate trying to hit waypoints
                    const lookAhead = Math.round(8 + ai.maxSpeed * 0.25);
                    const targetIdx = (ai.pathIdx + lookAhead) % totalPts;
                    const target = racePath[targetIdx];

                    // Steer towards target
                    const dx = target[0] - ai.col,
                        dy = target[1] - ai.row;
                    const targetAngle = Math.atan2(dy, dx);
                    let angleDiff = targetAngle - ai.angle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    ai.angle += angleDiff * 4 * dt;

                    // Accelerate
                    ai.speed += (ai.maxSpeed - ai.speed) * 2 * dt;

                    // Slope resistance
                    const hNow = getTerrainHeight(ai.col, ai.row);
                    const hAhead = getTerrainHeight(
                        ai.col + Math.cos(ai.angle) * 0.5,
                        ai.row + Math.sin(ai.angle) * 0.5,
                    );
                    if (ai.airHeight <= 0) {
                        ai.speed -= (hAhead - hNow) * 16 * dt;
                    }
                    ai.speed = Math.max(3, Math.min(ai.maxSpeed, ai.speed));

                    // Move
                    ai.col += Math.cos(ai.angle) * ai.speed * dt;
                    ai.row += Math.sin(ai.angle) * ai.speed * dt;
                    ai.col = Math.max(0, Math.min(MAP_SIZE - 1, ai.col));
                    ai.row = Math.max(0, Math.min(MAP_SIZE - 1, ai.row));

                    // Advance path index when close to current target point
                    const curTarget = racePath[ai.pathIdx];
                    const d = Math.sqrt(
                        (ai.col - curTarget[0]) ** 2 +
                            (ai.row - curTarget[1]) ** 2,
                    );
                    if (d < 3) {
                        ai.pathIdx = (ai.pathIdx + 1) % totalPts;
                    } else if (d > 8) {
                        // Too far from expected path point — re-snap to nearest
                        snapAIToNearestPath(ai);
                    }

                    // Mark "far side reached" when the AI's path progress is
                    // in the middle third of the track (40%–70% along the loop).
                    // This is used to validate genuine laps on figure-8 tracks
                    // where the start/finish line can be crossed at the intersection.
                    const relIdx = ai.pathIdx / totalPts;
                    if (relIdx > 0.4 && relIdx < 0.7) {
                        ai.reachedFarSide = true;
                    }

                    // Jump physics (same as player)
                    const sampleDist = 0.8;
                    const hBehind = getTerrainHeight(
                        ai.col - Math.cos(ai.angle) * sampleDist,
                        ai.row - Math.sin(ai.angle) * sampleDist,
                    );
                    const hHere = getTerrainHeight(ai.col, ai.row);
                    const hFront = getTerrainHeight(
                        ai.col + Math.cos(ai.angle) * sampleDist,
                        ai.row + Math.sin(ai.angle) * sampleDist,
                    );
                    const slopeAhead = hFront - hHere;
                    const slopeChange = hHere - hBehind - slopeAhead;
                    if (!ai.airborne) {
                        const speedFactor = ai.speed / ai.maxSpeed;
                        const atc = Math.round(ai.col),
                            atr = Math.round(ai.row);
                        const ramp =
                            atr >= 0 && atr < MAP_SIZE && atc >= 0 && atc < MAP_SIZE
                                ? rampLaunch[atr][atc]
                                : 0;
                        if (ramp > 0 && speedFactor > 0.25) {
                            ai.vertVel = Math.min(ramp * (0.5 + speedFactor), 18);
                            ai.airHeight = 0.01;
                            ai.jumpBaseH = getTerrainHeight(ai.col, ai.row);
                            ai.airborne = true;
                        } else if (slopeChange > 0.08 && speedFactor > 0.25) {
                            ai.vertVel = slopeChange * speedFactor * 35;
                            ai.airHeight = 0.01;
                            ai.jumpBaseH = getTerrainHeight(ai.col, ai.row);
                            ai.airborne = true;
                        }
                    }
                    if (ai.airborne) {
                        ai.vertVel -= 30 * dt;
                        ai.airHeight += ai.vertVel * dt;
                        if (ai.airHeight > 10) {
                            ai.airHeight = 10;
                            if (ai.vertVel > 0) ai.vertVel = 0;
                        }
                        const groundH = getTerrainHeight(ai.col, ai.row);
                        if (ai.jumpBaseH + ai.airHeight <= groundH) {
                            ai.airborne = false;
                            ai.airHeight = 0;
                            ai.vertVel = 0;
                            ai.jumpBaseH = 0;
                        }
                    }

                    // AI start/finish line crossing detection
                    if (checkpoints.length > 0 && !race.finished) {
                        const cp = checkpoints[0];
                        const g1c = cp.col + cp.nx * cp.dPos, g1r = cp.row + cp.ny * cp.dPos;
                        const g2c = cp.col - cp.nx * cp.dNeg, g2r = cp.row - cp.ny * cp.dNeg;
                        if (segmentsIntersect(ai.prevCol, ai.prevRow, ai.col, ai.row, g1c, g1r, g2c, g2r)) {
                            // Require that the AI actually reached the far side
                            // of the track since the last crossing. On figure-8
                            // tracks the gate can be crossed multiple times per
                            // lap at the intersection; this ensures only real
                            // laps are counted.
                            if (ai.crossedStart && ai.reachedFarSide) {
                                ai.lap++;
                                ai.reachedFarSide = false;
                                if (ai.lap >= TOTAL_LAPS) {
                                    const already = race.results.find(r => r.name === AI_NAMES[ai.colorIdx]);
                                    if (!already) {
                                        race.results.push({
                                            name: AI_NAMES[ai.colorIdx],
                                            color: AI_COLORS[ai.colorIdx].top,
                                            time: performance.now() - race.raceStartAbsolute,
                                        });
                                        if (race.firstFinishTime === 0) {
                                            race.firstFinishTime = performance.now();
                                        }
                                        // Only finalize now if everyone (player + all AI) is in
                                        if (race.results.length >= 1 + aiCars.length) {
                                            finalizeRace();
                                        }
                                    }
                                }
                            }
                            ai.crossedStart = true;
                        }
                    }
                }
            }

            // ── Car Drawing (generic) ──────────────────────────────────────────────
            function drawCarGeneric(carObj, colors) {
                const dx = Math.cos(carObj.angle),
                    dy = Math.sin(carObj.angle);
                const px = -dy,
                    py = dx;
                const air = carObj.airHeight || 0;
                const centerH = carObj.airborne
                    ? (carObj.jumpBaseH || 0) + air
                    : getTerrainHeight(carObj.col, carObj.row) + air;

                // Compute pitch (forward slope) and roll (side slope) from terrain
                let pitch = 0,
                    roll = 0;
                if (air < 0.5) {
                    const sampleDist = 0.8;
                    const hFront = getTerrainHeight(
                        carObj.col + dx * sampleDist,
                        carObj.row + dy * sampleDist,
                    );
                    const hBack = getTerrainHeight(
                        carObj.col - dx * sampleDist,
                        carObj.row - dy * sampleDist,
                    );
                    const hLeft = getTerrainHeight(
                        carObj.col + px * sampleDist,
                        carObj.row + py * sampleDist,
                    );
                    const hRight = getTerrainHeight(
                        carObj.col - px * sampleDist,
                        carObj.row - py * sampleDist,
                    );
                    pitch = Math.max(
                        -0.6,
                        Math.min(0.6, (hFront - hBack) / (sampleDist * 2)),
                    );
                    roll = Math.max(
                        -0.6,
                        Math.min(0.6, (hLeft - hRight) / (sampleDist * 2)),
                    );
                }

                function carPt(fwd, side, up) {
                    const c = carObj.col + dx * fwd + px * side;
                    const r = carObj.row + dy * fwd + py * side;
                    const tilt = fwd * pitch + side * roll;
                    return toScreen(c, r, centerH + up + tilt);
                }

                function fillPoly(pts, color) {
                    ctx.beginPath();
                    ctx.moveTo(pts[0][0], pts[0][1]);
                    for (let i = 1; i < pts.length; i++)
                        ctx.lineTo(pts[i][0], pts[i][1]);
                    ctx.closePath();
                    ctx.fillStyle = color;
                    ctx.fill();
                    ctx.strokeStyle = colors.stroke;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }

                const L = 1.1,
                    W = 0.5,
                    bodyH = 0.5,
                    cabH = 0.9,
                    cW = W * 0.85;

                // Shadow on ground
                const shGnd = [
                    toScreen(
                        carObj.col + dx * L + px * W,
                        carObj.row + dy * L + py * W,
                        centerH - air,
                    ),
                    toScreen(
                        carObj.col + dx * L - px * W,
                        carObj.row + dy * L - py * W,
                        centerH - air,
                    ),
                    toScreen(
                        carObj.col - dx * L - px * W,
                        carObj.row - dy * L - py * W,
                        centerH - air,
                    ),
                    toScreen(
                        carObj.col - dx * L + px * W,
                        carObj.row - dy * L + py * W,
                        centerH - air,
                    ),
                ];
                ctx.beginPath();
                ctx.moveTo(shGnd[0][0], shGnd[0][1] + 3);
                for (let i = 1; i < 4; i++)
                    ctx.lineTo(shGnd[i][0], shGnd[i][1] + 3);
                ctx.closePath();
                ctx.fillStyle = "rgba(0,0,0,0.25)";
                ctx.fill();

                // Wheels
                for (const [f, s] of [
                    [L * 0.65, W + 0.08],
                    [L * 0.65, -W - 0.08],
                    [-L * 0.6, W + 0.08],
                    [-L * 0.6, -W - 0.08],
                ]) {
                    const wp = carPt(f, s, 0.1);
                    ctx.beginPath();
                    ctx.arc(wp[0], wp[1], 3.5, 0, Math.PI * 2);
                    ctx.fillStyle = "#222";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(wp[0], wp[1], 1.8, 0, Math.PI * 2);
                    ctx.fillStyle = "#555";
                    ctx.fill();
                }

                // Collect ALL faces from both boxes, then sort and draw in one pass
                const faces = [];

                // Body: 8 vertices
                const bB = [
                    carPt(L, W, 0),
                    carPt(L, -W, 0),
                    carPt(-L, -W, 0),
                    carPt(-L, W, 0),
                ];
                const bT = [
                    carPt(L, W, bodyH),
                    carPt(L, -W, bodyH),
                    carPt(-L, -W, bodyH),
                    carPt(-L, W, bodyH),
                ];

                // Body 4 side faces
                for (let i = 0; i < 4; i++) {
                    const j = (i + 1) % 4;
                    const pts = [bB[i], bB[j], bT[j], bT[i]];
                    const avgY =
                        (pts[0][1] + pts[1][1] + pts[2][1] + pts[3][1]) / 4;
                    faces.push({
                        pts,
                        avgY,
                        color: i % 2 === 0 ? colors.side : colors.dark,
                        z: 0,
                    });
                }
                // Body top
                faces.push({
                    pts: [bT[0], bT[1], bT[2], bT[3]],
                    avgY: (bT[0][1] + bT[1][1] + bT[2][1] + bT[3][1]) / 4,
                    color: colors.top,
                    z: 1,
                });

                // Cabin: 8 vertices
                const cB = [
                    carPt(0.3, cW, bodyH),
                    carPt(0.3, -cW, bodyH),
                    carPt(-0.55, -cW, bodyH),
                    carPt(-0.55, cW, bodyH),
                ];
                const cT = [
                    carPt(0.3, cW, cabH),
                    carPt(0.3, -cW, cabH),
                    carPt(-0.55, -cW, cabH),
                    carPt(-0.55, cW, cabH),
                ];

                // Cabin 4 side faces (glass)
                for (let i = 0; i < 4; i++) {
                    const j = (i + 1) % 4;
                    const pts = [cB[i], cB[j], cT[j], cT[i]];
                    const avgY =
                        (pts[0][1] + pts[1][1] + pts[2][1] + pts[3][1]) / 4;
                    faces.push({
                        pts,
                        avgY,
                        color: i % 2 === 0 ? "#3a7aaa" : "#2a5a7f",
                        z: 2,
                    });
                }
                // Cabin top
                faces.push({
                    pts: [cT[0], cT[1], cT[2], cT[3]],
                    avgY: (cT[0][1] + cT[1][1] + cT[2][1] + cT[3][1]) / 4,
                    color: "#4a8ab8",
                    z: 3,
                });

                // Sort: first by z (height layer), then by avgY within same layer
                faces.sort((a, b) =>
                    a.z !== b.z ? a.z - b.z : a.avgY - b.avgY,
                );

                for (const f of faces) fillPoly(f.pts, f.color);

                // Only draw headlights/taillights if their face is camera-facing
                function isFrontFacing(p0, p1, p2) {
                    return (
                        (p1[0] - p0[0]) * (p2[1] - p0[1]) -
                            (p1[1] - p0[1]) * (p2[0] - p0[0]) <
                        0
                    );
                }
                // Front face visible? (bB[0] -> bB[1] -> bT[1])
                if (isFrontFacing(bB[0], bB[1], bT[1])) {
                    for (const s of [W * 0.55, -W * 0.55]) {
                        const hl = carPt(L, s, bodyH * 0.5);
                        ctx.beginPath();
                        ctx.arc(hl[0], hl[1], 1.8, 0, Math.PI * 2);
                        ctx.fillStyle = "#ffee88";
                        ctx.fill();
                    }
                }
                // Back face visible? (bB[2] -> bB[3] -> bT[3])
                if (isFrontFacing(bB[2], bB[3], bT[3])) {
                    for (const s of [W * 0.55, -W * 0.55]) {
                        const tl = carPt(-L, s, bodyH * 0.4);
                        ctx.beginPath();
                        ctx.arc(tl[0], tl[1], 1.8, 0, Math.PI * 2);
                        ctx.fillStyle = "#ff3333";
                        ctx.fill();
                    }
                }
            }

            const PLAYER_COLORS = {
                top: "#e03030",
                side: "#cc2828",
                dark: "#b02020",
                stroke: "#801818",
            };

            function drawCar() {
                drawCarGeneric(car, PLAYER_COLORS);
            }

            // ── Viewport Culling ───────────────────────────────────────────────────
            function getVisibleRange() {
                // Convert screen corners to approximate tile coords
                const margin = 2;
                const cx = camera.x + canvas.width / 2;
                const cy = camera.y + canvas.height / 2;
                const halfW = canvas.width / 2 + TILE_W;
                const halfH =
                    canvas.height / 2 + MAX_ELEVATION * TILE_DEPTH + TILE_H;

                // Inverse isometric: col = (sx/(W/2) + sy/(H/2))/2, row = (sy/(H/2) - sx/(W/2))/2
                // We compute conservative bounds by checking all 4 corners
                let minCol = Infinity,
                    maxCol = -Infinity,
                    minRow = Infinity,
                    maxRow = -Infinity;

                for (const [dx, dy] of [
                    [-halfW, -halfH],
                    [halfW, -halfH],
                    [-halfW, halfH],
                    [halfW, halfH],
                ]) {
                    const wx = cx + dx;
                    const wy = cy + dy;
                    const c = (wx / (TILE_W / 2) + wy / (TILE_H / 2)) / 2;
                    const r = (wy / (TILE_H / 2) - wx / (TILE_W / 2)) / 2;
                    minCol = Math.min(minCol, c);
                    maxCol = Math.max(maxCol, c);
                    minRow = Math.min(minRow, r);
                    maxRow = Math.max(maxRow, r);
                }

                return {
                    minCol: Math.max(0, Math.floor(minCol) - margin),
                    maxCol: Math.min(MAP_SIZE - 1, Math.ceil(maxCol) + margin),
                    minRow: Math.max(0, Math.floor(minRow) - margin),
                    maxRow: Math.min(MAP_SIZE - 1, Math.ceil(maxRow) + margin),
                };
            }

            // ── Checkpoint Rendering ───────────────────────────────────────────────
            function isCheckpointPassed(i) {
                if (!race.raceStarted) return false;
                if (i === 0) return false; // start/finish handled separately
                // Passed if index is behind nextCheckpoint in circular order
                if (race.nextCheckpoint === 0) {
                    // We've wrapped around, so all non-zero are passed
                    return race.checkpointsPassed >= race.totalCheckpoints - 1
                        ? true
                        : i <= race.checkpointsPassed;
                }
                return i < race.nextCheckpoint;
            }

            function drawFlag(col, row, passed, isFinish) {
                const groundE = getTerrainHeight(col, row);
                const poleHeight = 4.5;
                const flagHeight = 1.5;
                const bottom = toScreen(col, row, groundE);
                const top = toScreen(col, row, groundE + poleHeight);
                const flagTop = toScreen(col, row, groundE + poleHeight);
                const flagMid = toScreen(
                    col,
                    row,
                    groundE + poleHeight - flagHeight * 0.5,
                );
                const flagBot = toScreen(
                    col,
                    row,
                    groundE + poleHeight - flagHeight,
                );

                // Pole
                ctx.beginPath();
                ctx.moveTo(bottom[0], bottom[1]);
                ctx.lineTo(top[0], top[1]);
                ctx.strokeStyle = "#888";
                ctx.lineWidth = 2;
                ctx.stroke();

                // Flag triangle (points to the right in screen space)
                const flagW = 15;
                const color = isFinish
                    ? "#fff"
                    : passed
                      ? "#eedd22"
                      : "#dd2222";
                ctx.beginPath();
                ctx.moveTo(flagTop[0], flagTop[1]);
                ctx.lineTo(flagTop[0] + flagW, flagMid[1]);
                ctx.lineTo(flagBot[0], flagBot[1]);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = isFinish
                    ? "#000"
                    : passed
                      ? "#887711"
                      : "#771111";
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            function drawStartFinish() {
                if (checkpoints.length === 0) return;
                const cp = checkpoints[0];
                const p1c = cp.col + cp.nx * cp.dPos;
                const p1r = cp.row + cp.ny * cp.dPos;
                const p2c = cp.col - cp.nx * cp.dNeg;
                const p2r = cp.row - cp.ny * cp.dNeg;
                const e1 = getTerrainHeight(p1c, p1r) + 0.1;
                const e2 = getTerrainHeight(p2c, p2r) + 0.1;
                const s1 = toScreen(p1c, p1r, e1);
                const s2 = toScreen(p2c, p2r, e2);

                // Thick checkered-style line
                ctx.beginPath();
                ctx.moveTo(s1[0], s1[1]);
                ctx.lineTo(s2[0], s2[1]);
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 7;
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(s1[0], s1[1] - 2);
                ctx.lineTo(s2[0], s2[1] - 2);
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 7;
                ctx.setLineDash([8, 8]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            function drawCheckpoints() {
                for (let i = 1; i < checkpoints.length; i++) {
                    const cp = checkpoints[i];
                    const isNext = i === race.nextCheckpoint;
                    const passed = isCheckpointPassed(i);

                    const p1c = cp.col + cp.nx * cp.dPos;
                    const p1r = cp.row + cp.ny * cp.dPos;
                    const p2c = cp.col - cp.nx * cp.dNeg;
                    const p2r = cp.row - cp.ny * cp.dNeg;

                    const e1 = getTerrainHeight(p1c, p1r) + 0.1;
                    const e2 = getTerrainHeight(p2c, p2r) + 0.1;
                    const s1 = toScreen(p1c, p1r, e1);
                    const s2 = toScreen(p2c, p2r, e2);

                    ctx.beginPath();
                    ctx.moveTo(s1[0], s1[1]);
                    ctx.lineTo(s2[0], s2[1]);

                    if (isNext) {
                        ctx.strokeStyle = "rgba(255, 220, 40, 0.8)";
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    } else {
                        ctx.strokeStyle = passed
                            ? "rgba(220, 200, 40, 0.3)"
                            : "rgba(255, 255, 255, 0.2)";
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                }
            }

            function drawCheckpointFlags() {
                for (let i = 0; i < checkpoints.length; i++) {
                    const cp = checkpoints[i];
                    const isFinish = i === 0;
                    const passed = isCheckpointPassed(i);
                    const p1c = cp.col + cp.nx * cp.dPos;
                    const p1r = cp.row + cp.ny * cp.dPos;
                    const p2c = cp.col - cp.nx * cp.dNeg;
                    const p2r = cp.row - cp.ny * cp.dNeg;
                    drawFlag(p1c, p1r, passed || isFinish, isFinish);
                    drawFlag(p2c, p2r, passed || isFinish, isFinish);
                }
            }

            function drawTuningPanel() {
                const panelW = 280,
                    lineH = 22;
                const panelH = tuningParams.length * lineH + 30;
                const px = 10,
                    py = 10;

                ctx.fillStyle = "rgba(0,0,0,0.8)";
                ctx.fillRect(px, py, panelW, panelH);
                ctx.strokeStyle = "#555";
                ctx.strokeRect(px, py, panelW, panelH);

                ctx.font = "bold 13px monospace";
                ctx.fillStyle = "#fff";
                ctx.fillText(
                    "TUNING [X]  I/K select  J/L adjust",
                    px + 8,
                    py + 16,
                );

                ctx.font = "12px monospace";
                for (let i = 0; i < tuningParams.length; i++) {
                    const p = tuningParams[i];
                    const y = py + 28 + i * lineH;
                    const val = p.get();
                    const pct = (val - p.min) / (p.max - p.min);

                    // Highlight selected
                    if (i === tuningSelected) {
                        ctx.fillStyle = "rgba(255,255,100,0.15)";
                        ctx.fillRect(px + 2, y - 10, panelW - 4, lineH);
                        ctx.fillStyle = "#ff0";
                    } else {
                        ctx.fillStyle = "#aaa";
                    }

                    ctx.fillText(p.label, px + 8, y + 2);

                    // Separator row
                    if (p.label.startsWith("---")) continue;

                    // Value
                    const valStr = p.step < 1 ? val.toFixed(2) : val.toFixed(0);
                    ctx.fillText(valStr, px + 155, y + 2);

                    // Bar
                    const barX = px + 190,
                        barW = 80,
                        barH = 8;
                    ctx.fillStyle = "#333";
                    ctx.fillRect(barX, y - 4, barW, barH);
                    ctx.fillStyle = i === tuningSelected ? "#ff0" : "#0af";
                    ctx.fillRect(barX, y - 4, barW * pct, barH);

            window.addEventListener("keydown", (e) => {
                keys.add(e.key);
                // Race finished: any key starts new race
                if (race.finished) {
                    generateWorld(Date.now());
                    minimapCanvas = null;
                    terrainChunks = null;
                    buildTerrainCache();
                    initCar();
                    initAICars();
                    resetRace();
                    return;
                }
                if (e.key === "r" || e.key === "R") {
                    generateWorld(Date.now());
                    minimapCanvas = null;
                    terrainChunks = null;
                    buildTerrainCache();
                    initCar();
                    initAICars();
                    resetRace();
                }
                if (e.key === "z" || e.key === "Z") showFPS = !showFPS;
                if (e.key === "x" || e.key === "X") showTuning = !showTuning;
                if (e.key === "c" || e.key === "C")
                    showCheckpoints = !showCheckpoints;
                // Tuning panel controls (I/K = up/down, J/L = adjust)
                if (showTuning) {
                    if (e.key === "i" || e.key === "I") {
                        tuningSelected =
                            (tuningSelected - 1 + tuningParams.length) %
                            tuningParams.length;
                        return;
                    }
                    if (e.key === "k" || e.key === "K") {
                        tuningSelected =
                            (tuningSelected + 1) % tuningParams.length;
                        return;
                    }
                    if (
                        e.key === "j" ||
                        e.key === "J" ||
                        e.key === "l" ||
                        e.key === "L"
                    ) {
                        const p = tuningParams[tuningSelected];
                        const dir = e.key === "l" || e.key === "L" ? 1 : -1;
                        p.set(
                            Math.round(
                                Math.max(
                                    p.min,
                                    Math.min(p.max, p.get() + p.step * dir),
                                ) * 100,
                            ) / 100,
                        );
                        return;
                    }
                }
                // Prevent page scroll
                if (
                    [
                        "ArrowUp",
                        "ArrowDown",
                        "ArrowLeft",
                        "ArrowRight",
                    ].includes(e.key)
                )
                    e.preventDefault();
            });
